server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:chessdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
jwt:
  secret: chess-ancient-manuscript-jwt-secret-key-2024-very-long-key
  expiration: 86400000
